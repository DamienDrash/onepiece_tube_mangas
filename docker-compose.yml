services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - STORAGE_DIR=/app/data
      - BASE_URL=https://onepiece.tube
      - HOST=0.0.0.0
      - PORT=8001
    env_file:
      - ./backend/.env
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://services.frigew.ski/op
        - NEXT_PUBLIC_API_KEY=SPSP5OzcvF24kvgy7PUV4_2hRAxrPjPo9lG4u5L9wBY
        - BASE_PATH=/op
    ports:
      - "127.0.0.1:9120:3001"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://services.frigew.ski/op
      - BASE_PATH=/op
      # Set NEXT_PUBLIC_API_KEY to match API_KEY in backend/.env
      - NEXT_PUBLIC_API_KEY=SPSP5OzcvF24kvgy7PUV4_2hRAxrPjPo9lG4u5L9wBY
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3001/op >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  data:
    driver: local

networks:
  default:
    driver: bridge
